<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nonki Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #e8eaed;
      color: #1a1c23;
      min-height: 100vh;
      padding: 16px;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ── カード共通 ─────────────────────────────────── */
    .card {
      background: #ffffff;
      border-radius: 18px;
      padding: 20px;
      border: 1px solid #d1d5db;
      box-shadow: 0 2px 8px #0000001a;
    }
    .card-title {
      font-size: 13px;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 14px;
    }

    /* ── ステータスバー ────────────────────────────── */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #ffffff;
      border-radius: 18px;
      padding: 16px 20px;
      border: 1px solid #d1d5db;
      box-shadow: 0 2px 8px #0000001a;
    }
    .status-label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 16px;
      font-weight: 600;
      color: #1a1c23;
    }
    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }
    .dot-green  { background: #16a34a; box-shadow: 0 0 6px #16a34a88; }
    .dot-red    { background: #dc2626; box-shadow: 0 0 6px #dc262688; }
    .dot-yellow { background: #d97706; box-shadow: 0 0 6px #d9770688; }
    .updated-at { font-size: 13px; color: #6b7280; }

    /* ── アラート（現在） ────────────────────────────── */
    .alert-card {
      border-radius: 18px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 500;
    }
    .alert-warning { background: #fffbeb; border: 1px solid #fbbf24; color: #92400e; }
    .alert-danger  { background: #fef2f2; border: 1px solid #fca5a5; color: #dc2626; }
    .hidden { display: none !important; }

    /* ── ポジション ──────────────────────────────────── */
    .position-main { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .position-sub  { font-size: 14px; color: #6b7280; }
    .badge {
      display: inline-block;
      padding: 3px 11px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 600;
    }
    .badge-buy  { background: #dcfce7; color: #16a34a; }
    .badge-sell { background: #fee2e2; color: #dc2626; }
    .badge-none { background: #f3f4f6; color: #6b7280; }

    /* ── ③ 日次/月次 タブ ────────────────────────────── */
    .tab-row {
      display: flex;
      background: #f3f4f6;
      border-radius: 10px;
      padding: 3px;
      margin-bottom: 18px;
      gap: 3px;
    }
    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      border-radius: 8px;
      padding: 8px 0;
      font-size: 14px;
      font-weight: 600;
      color: #6b7280;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, color 0.15s;
    }
    .tab-btn.active {
      background: #ffffff;
      color: #1a1c23;
      box-shadow: 0 1px 4px #0000001a;
    }

    /* ── 成績 ────────────────────────────────────────── */
    .wl-row { display: flex; gap: 12px; margin-bottom: 18px; }
    .wl-box {
      flex: 1;
      background: #f3f4f6;
      border-radius: 12px;
      padding: 14px 12px;
      text-align: center;
    }
    .wl-value { font-size: 28px; font-weight: 800; margin-bottom: 4px; line-height: 1; }
    .wl-label { font-size: 13px; color: #6b7280; }
    .metric-list { display: flex; flex-direction: column; gap: 0; margin-bottom: 4px; }
    .metric-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 11px 0;
      border-bottom: 1px solid #e5e7eb;
      font-size: 15px;
    }
    .metric-row:last-child { border-bottom: none; }
    .metric-label { color: #6b7280; }
    .metric-value { font-weight: 700; color: #1a1c23; }

    /* ── 折りたたみ共通 ─────────────────────────────── */
    .details-toggle {
      background: none;
      border: none;
      color: #6b7280;
      font-size: 14px;
      cursor: pointer;
      padding: 10px 0 0;
      width: 100%;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
    }
    .details-toggle:hover { color: #374151; }
    .details-content {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #e5e7eb;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      font-size: 15px;
    }
    .detail-label { color: #6b7280; }
    .detail-note {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid #e5e7eb;
    }
    .empty-note {
      text-align: center;
      color: #9ca3af;
      font-size: 14px;
      padding: 16px 0 4px;
    }

    .positive { color: #16a34a; }
    .negative { color: #dc2626; }
    .neutral  { color: #1a1c23; }

    /* ── セッション ──────────────────────────────────── */
    .session-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #e5e7eb;
      font-size: 15px;
      color: #1a1c23;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .session-row:last-of-type { border-bottom: none; }
    .session-name { display: flex; align-items: center; gap: 10px; font-weight: 500; }
    .session-right { display: flex; align-items: center; gap: 8px; }
    .session-badges { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    .session-chevron { color: #9ca3af; font-size: 12px; transition: transform 0.2s; }
    .session-chevron.open { transform: rotate(180deg); }

    .badge-observe  { background: #dbeafe; color: #1d4ed8; padding: 3px 10px; border-radius: 99px; font-size: 12px; font-weight: 600; }
    .badge-buy-only { background: #dcfce7; color: #16a34a; padding: 3px 10px; border-radius: 99px; font-size: 12px; font-weight: 600; }

    /* ④ セッション詳細（折りたたみ） */
    .session-detail {
      background: #f9fafb;
      border-radius: 10px;
      padding: 12px 14px;
      margin: 4px 0 8px;
      font-size: 14px;
    }
    .session-detail-row {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
      border-bottom: 1px solid #e5e7eb;
      color: #374151;
    }
    .session-detail-row:last-child { border-bottom: none; }
    .session-detail-label { color: #6b7280; }

    /* ② Tokyo 進捗バー強化 */
    .progress-wrap { margin-top: 12px; padding-top: 12px; border-top: 1px solid #e5e7eb; }
    .progress-header {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 8px;
      align-items: center;
    }
    .progress-pct {
      font-size: 18px;
      font-weight: 800;
      color: #16a34a;
    }
    progress {
      width: 100%;
      height: 12px;
      border-radius: 6px;
      appearance: none;
      -webkit-appearance: none;
      margin-bottom: 6px;
    }
    progress::-webkit-progress-bar   { background: #e5e7eb; border-radius: 6px; }
    progress::-webkit-progress-value { background: #16a34a; border-radius: 6px; }
    progress::-moz-progress-bar      { background: #16a34a; border-radius: 6px; }
    .progress-sub {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #9ca3af;
    }

    /* ① 直近トレード履歴 */
    .trade-list { display: flex; flex-direction: column; gap: 10px; }
    .trade-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #f9fafb;
      border-radius: 12px;
      padding: 12px 14px;
      border-left: 4px solid transparent;
    }
    .trade-item.win  { border-left-color: #16a34a; }
    .trade-item.loss { border-left-color: #dc2626; }
    .trade-item.open { border-left-color: #d97706; }
    .trade-left { display: flex; flex-direction: column; gap: 3px; }
    .trade-symbol {
      font-size: 15px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .trade-time { font-size: 12px; color: #9ca3af; }
    .trade-right { text-align: right; display: flex; flex-direction: column; gap: 3px; align-items: flex-end; }
    .trade-pnl { font-size: 16px; font-weight: 800; }
    .trade-result {
      font-size: 12px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 99px;
    }
    .trade-result.win  { background: #dcfce7; color: #16a34a; }
    .trade-result.loss { background: #fee2e2; color: #dc2626; }
    .trade-result.open { background: #fef3c7; color: #d97706; }
    .signal-tag {
      font-size: 11px;
      color: #9ca3af;
      background: #f3f4f6;
      padding: 1px 6px;
      border-radius: 4px;
    }

    /* ⑤ アラート履歴 */
    .alert-hist-item {
      display: flex;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid #e5e7eb;
      font-size: 14px;
      align-items: flex-start;
    }
    .alert-hist-item:last-child { border-bottom: none; }
    .alert-hist-time { color: #9ca3af; white-space: nowrap; font-size: 12px; padding-top: 1px; }
    .alert-hist-msg  { color: #374151; }

    /* ── ① シグナル状態カード ──────────────────────────── */
    .signal-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 20px;
    }
    .signal-icon { font-size: 30px; flex-shrink: 0; }
    .signal-label { font-size: 16px; font-weight: 700; color: #1a1c23; }
    .signal-sub { font-size: 13px; color: #6b7280; margin-top: 3px; }
    .signal-card.status-waiting  { border-left: 4px solid #6b7280; }
    .signal-card.status-in_position { border-left: 4px solid #d97706; }
    .signal-card.status-caution  { border-left: 4px solid #dc2626; }

    /* ── ② 最終トレード経過時間 ──────────────────────── */
    .elapsed-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
      font-size: 13px;
      color: #6b7280;
    }
    .elapsed-row strong { color: #374151; }

    /* ── ③ DDゲージ ──────────────────────────────────── */
    .dd-gauge-wrap { margin-top: 4px; }
    .dd-gauge-bar {
      height: 8px;
      background: #e5e7eb;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 5px;
    }
    .dd-gauge-fill {
      height: 100%;
      border-radius: 4px;
      background: #16a34a;
      transition: width 0.4s;
    }
    .dd-gauge-fill.warn   { background: #d97706; }
    .dd-gauge-fill.danger { background: #dc2626; }
    .dd-gauge-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #9ca3af;
    }

    /* ── エラー表示 ───────────────────────────────────── */
    .error-card {
      background: #ffffff;
      border: 1px solid #fca5a5;
      border-radius: 18px;
      padding: 24px 20px;
      box-shadow: 0 2px 8px #0000001a;
      text-align: center;
    }
    .error-icon  { font-size: 36px; margin-bottom: 12px; }
    .error-title { font-size: 17px; font-weight: 700; color: #dc2626; margin-bottom: 10px; }
    .error-desc  { font-size: 14px; color: #6b7280; line-height: 1.7; margin-bottom: 20px; }
    .reload-btn {
      display: inline-block;
      background: #1d4ed8;
      color: #ffffff;
      border: none;
      border-radius: 99px;
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      margin-bottom: 16px;
    }
    .reload-btn:active { opacity: 0.8; }
    .error-last-success { font-size: 12px; color: #9ca3af; }
    .error-retry-note   { font-size: 12px; color: #9ca3af; margin-top: 8px; }

    /* ── フッター ─────────────────────────────────────── */
    .footer { text-align: center; color: #9ca3af; font-size: 12px; padding: 8px 0 4px; }
  </style>
</head>
<body>
<div class="container" id="app">
  <div class="error-card hidden" id="load-error">
    <div class="error-icon">⚠️</div>
    <div class="error-title">データを取得できませんでした</div>
    <div class="error-desc">
      GitHub Pages の反映に時間がかかっている<br>場合があります。<br>
      1〜2分後に再読み込みしてください。
    </div>
    <button class="reload-btn" onclick="location.reload()">🔄 再読み込み</button>
    <div class="error-last-success" id="last-success-label"></div>
    <div class="error-retry-note" id="retry-note"></div>
  </div>
</div>

<script>
// ── ユーティリティ ─────────────────────────────────────────────
function fmt_pnl(jpy) {
  if (jpy === null || jpy === undefined) return "—";
  const sign = jpy >= 0 ? "+" : "";
  return sign + jpy.toLocaleString("ja-JP") + "円";
}
function pnl_class(v) {
  if (v === null || v === undefined) return "neutral";
  return v >= 0 ? "positive" : "negative";
}
function fmt_winrate(v) {
  if (v === null || v === undefined) return "—";
  return Math.round(v * 100) + "%";
}
function fmt_ev_pips(v) {
  if (v === null || v === undefined) return "—";
  const sign = v >= 0 ? "+" : "";
  return sign + v.toFixed(2) + " pips/件";
}
function fmt_ev_jpy(v) {
  if (v === null || v === undefined) return "—";
  const sign = v >= 0 ? "+" : "";
  return sign + Math.round(v).toLocaleString("ja-JP") + "円/件";
}
function fmt_dd(r) {
  if (r === null || r === undefined) return "—";
  return r.toFixed(2) + "R";
}
function dd_class(r) {
  if (r === null || r === undefined) return "neutral";
  return r >= 4.0 ? "negative" : "positive";
}

// ── ③ タブ状態 ──────────────────────────────────────────────
let _current_tab = "monthly"; // "daily" | "monthly"

// ── ① シグナル状態カード ─────────────────────────────────────
function build_signal_state(signal_state, last_trade_elapsed) {
  const s      = signal_state || { status: "waiting", label: "監視中", sub: "" };
  const status = s.status || "waiting";
  const icons  = {
    waiting:     "📡",
    in_position: "🟡",
    caution:     "🚨",
  };
  const icon = icons[status] || "📡";
  const elapsed_html = last_trade_elapsed
    ? `<div class="elapsed-row">⏱ 最終トレード: <strong>${last_trade_elapsed}</strong></div>`
    : "";

  return `
    <div class="card signal-card status-${status}">
      <div class="signal-icon">${icon}</div>
      <div>
        <div class="signal-label">${s.label}</div>
        <div class="signal-sub">${s.sub || ""}</div>
        ${elapsed_html}
      </div>
    </div>`;
}

// ── カードビルダー ─────────────────────────────────────────────
function build_status(system, meta) {
  const is_running = system.status === "running";
  const dot_cls = is_running ? "dot-green" : "dot-red";
  const label   = is_running ? "稼働中 [RUNNING]" : "停止中 [STOPPED]";
  return `
    <div class="status-bar">
      <div class="status-label">
        <span class="dot ${dot_cls}"></span>
        ${label}
      </div>
      <div class="updated-at">最終更新: ${meta.updated_at}</div>
    </div>`;
}

function build_alert(alert) {
  if (!alert) return "";
  const cls  = alert.level === "danger" ? "alert-danger" : "alert-warning";
  const icon = alert.level === "danger" ? "🔴" : "⚠️";
  return `<div class="alert-card ${cls}">${icon} ${alert.message}</div>`;
}

function build_position(pos) {
  if (!pos) return "";
  let main, sub;
  if (pos.has_position) {
    const dir_label = pos.direction === "buy" ? "買い [BUY]" : "売り [SELL]";
    const badge_cls = pos.direction === "buy" ? "badge-buy" : "badge-sell";
    main = `${pos.symbol} <span class="badge ${badge_cls}">${dir_label}</span>`;
    sub  = "保有中（損益はリアルタイム反映されません）";
  } else {
    main = `<span class="badge badge-none">ポジションなし</span>`;
    sub  = "現在取引していません";
  }
  return `
    <div class="card">
      <div class="card-title">📍 現在のポジション [Position]</div>
      <div class="position-main">${main}</div>
      <div class="position-sub">${sub}</div>
    </div>`;
}

// ③ 日次/月次切り替え対応の成績カード
function build_performance(daily, monthly) {
  const m = _current_tab === "daily" ? (daily || {}) : (monthly || {});
  const wins    = m.wins    ?? "—";
  const losses  = m.losses  ?? "—";
  const pnl_jpy = m.pnl_jpy ?? null;
  const win_rate = m.win_rate ?? null;
  const ev_jpy  = m.ev_jpy  ?? null;
  const ev_pips = m.ev_pips ?? null;
  const dd_r    = m.dd_r    ?? null;

  const pnl_c = pnl_class(pnl_jpy);
  const ev_c  = pnl_class(ev_jpy ?? ev_pips);
  const dd_c  = dd_class(dd_r);

  const ev_text = ev_jpy !== null ? fmt_ev_jpy(ev_jpy)
                : ev_pips !== null ? fmt_ev_pips(ev_pips)
                : "—";

  const no_data = wins === "—" && losses === "—";

  return `
    <div class="card">
      <div class="card-title">📅 成績 [Performance]</div>

      <div class="tab-row">
        <button class="tab-btn ${_current_tab === 'daily' ? 'active' : ''}"
                onclick="switch_tab('daily')">今日</button>
        <button class="tab-btn ${_current_tab === 'monthly' ? 'active' : ''}"
                onclick="switch_tab('monthly')">今月</button>
      </div>

      ${no_data ? `<div class="empty-note">まだデータがありません</div>` : `
      <div class="wl-row">
        <div class="wl-box">
          <div class="wl-value positive">${wins}</div>
          <div class="wl-label">✅ 勝ち</div>
        </div>
        <div class="wl-box">
          <div class="wl-value negative">${losses}</div>
          <div class="wl-label">❌ 負け</div>
        </div>
      </div>

      <div class="metric-list">
        <div class="metric-row">
          <span class="metric-label">損益 [P&amp;L]</span>
          <span class="metric-value ${pnl_c}">${fmt_pnl(pnl_jpy)}</span>
        </div>
        <div class="metric-row">
          <span class="metric-label">勝率 [WinRate]</span>
          <span class="metric-value">${fmt_winrate(win_rate)}</span>
        </div>
      </div>

      <button class="details-toggle" onclick="toggle_details(this)">▼ 詳細を見る</button>
      <div class="details-content hidden">
        <div class="detail-row">
          <span class="detail-label">期待値 [EV]</span>
          <span class="${ev_c}">${ev_text}</span>
        </div>
        <div class="detail-row" style="flex-direction:column;align-items:stretch;gap:8px;">
          <div style="display:flex;justify-content:space-between;">
            <span class="detail-label">最大下落 [DD]</span>
            <span class="${dd_c}" style="font-weight:700;">${fmt_dd(dd_r)}</span>
          </div>
          ${dd_r !== null ? (() => {
            const pct = Math.min(dd_r / 5 * 100, 100);
            const fill_cls = dd_r >= 5.0 ? "danger" : dd_r >= 4.0 ? "warn" : "";
            return `
            <div class="dd-gauge-wrap">
              <div class="dd-gauge-bar">
                <div class="dd-gauge-fill ${fill_cls}" style="width:${pct.toFixed(1)}%"></div>
              </div>
              <div class="dd-gauge-row">
                <span>0R</span>
                <span style="color:#6b7280">上限 5R</span>
              </div>
            </div>`;
          })() : ""}
        </div>
        <div class="detail-note">※ 1R = 総資産の2%。DD 5R超えで要警戒。</div>
      </div>
      `}
    </div>`;
}

// ④ セッション詳細 折りたたみ対応
function build_sessions(sessions) {
  if (!sessions) return "";
  const s = sessions;

  function session_row(name, label, session, is_tokyo) {
    const dot = session.active ? "dot-green" : "dot-red";
    const status_text = session.active ? "稼働中" : "停止中";

    let detail_html = "";
    if (is_tokyo) {
      const cur = session.progress_current ?? 0;
      const tgt = session.progress_target  ?? 50;
      const pct = tgt > 0 ? Math.round(cur / tgt * 100) : 0;
      const dd_c = dd_class(session.dd_r);
      const ev_c = pnl_class(session.ev_pips);

      detail_html = `
        <div class="session-detail hidden" id="detail-${name}">
          <div class="session-detail-row">
            <span class="session-detail-label">本採用まであと</span>
            <span><strong>${tgt - cur}件</strong>（${cur} / ${tgt}）</span>
          </div>
          ${session.ev_pips != null ? `
          <div class="session-detail-row">
            <span class="session-detail-label">期待値 [EV]</span>
            <span class="${ev_c}">${fmt_ev_pips(session.ev_pips)}</span>
          </div>` : ""}
          ${session.dd_r != null ? `
          <div class="session-detail-row">
            <span class="session-detail-label">最大下落 [DD]</span>
            <span class="${dd_c}">${fmt_dd(session.dd_r)}</span>
          </div>` : ""}
          <div class="session-detail-row">
            <span class="session-detail-label">方向</span>
            <span>BUYのみ [BUY ONLY]</span>
          </div>
        </div>`;
    } else {
      detail_html = `
        <div class="session-detail hidden" id="detail-${name}">
          <div class="session-detail-row">
            <span class="session-detail-label">状態</span>
            <span>${status_text}</span>
          </div>
          ${session.alert ? `
          <div class="session-detail-row">
            <span class="session-detail-label">アラート</span>
            <span class="negative">${session.alert}</span>
          </div>` : ""}
        </div>`;
    }

    const badges = is_tokyo ? `
      <div class="session-badges">
        <span class="badge-observe">観察中 [OBSERVE]</span>
        <span class="badge-buy-only">BUYのみ</span>
      </div>` : `<span style="font-size:14px;color:#6b7280">${status_text}</span>`;

    return `
      <div class="session-row" onclick="toggle_session('${name}', this)">
        <div class="session-name">
          <span class="dot ${dot}"></span>
          ${label}
        </div>
        <div class="session-right">
          ${badges}
          <span class="session-chevron" id="chev-${name}">▼</span>
        </div>
      </div>
      ${detail_html}`;
  }

  // Tokyo 進捗バー（カード下部）
  const tokyo = s.tokyo || {};
  const cur = tokyo.progress_current ?? 0;
  const tgt = tokyo.progress_target  ?? 50;
  const pct = tgt > 0 ? Math.round(cur / tgt * 100) : 0;

  return `
    <div class="card">
      <div class="card-title">🗂 セッション状態 [Sessions]</div>
      ${session_row("london",  "London",   s.london  || {active: false}, false)}
      ${session_row("newyork", "NewYork",  s.newyork || {active: false}, false)}
      ${session_row("tokyo",   "Tokyo ⭐", s.tokyo   || {active: false}, true)}

      <div class="progress-wrap">
        <div class="progress-header">
          <span>本採用まであと <strong style="color:#1a1c23">${tgt - cur}件</strong></span>
          <span class="progress-pct">${pct}%</span>
        </div>
        <progress value="${cur}" max="${tgt}"></progress>
        <div class="progress-sub">
          <span>0件</span>
          <span>${cur} / ${tgt} 件</span>
          <span>${tgt}件</span>
        </div>
      </div>
    </div>`;
}

// ① 直近トレード履歴
function build_recent_trades(trades) {
  const list = (trades || []).slice(0, 5);
  if (list.length === 0) {
    return `
      <div class="card">
        <div class="card-title">📋 直近のトレード [Recent Trades]</div>
        <div class="empty-note">まだトレード履歴がありません</div>
      </div>`;
  }

  const items = list.map(t => {
    const result   = t.result || "open";
    const dir_label = t.direction === "buy" ? "🟢 BUY" : "🔴 SELL";
    const pnl_c    = result === "win" ? "positive" : result === "loss" ? "negative" : "neutral";
    const res_label = result === "win" ? "勝ち" : result === "loss" ? "負け" : "保有中";
    const pnl_text = (t.pnl_jpy != null) ? fmt_pnl(t.pnl_jpy) : "—";
    const sig = t.signal_type ? `<span class="signal-tag">${t.signal_type}</span>` : "";

    return `
      <div class="trade-item ${result}">
        <div class="trade-left">
          <div class="trade-symbol">
            ${t.symbol || "—"} ${dir_label} ${sig}
          </div>
          <div class="trade-time">${t.timestamp || t.closed_at || "—"}</div>
        </div>
        <div class="trade-right">
          <div class="trade-pnl ${pnl_c}">${pnl_text}</div>
          <div class="trade-result ${result}">${res_label}</div>
        </div>
      </div>`;
  }).join("");

  return `
    <div class="card">
      <div class="card-title">📋 直近のトレード [Recent Trades]</div>
      <div class="trade-list">${items}</div>
    </div>`;
}

// ⑤ アラート履歴
function build_alert_history(history) {
  const list = (history || []).slice(0, 3);
  if (list.length === 0) {
    return `
      <div class="card">
        <div class="card-title">🔔 アラート履歴 [Alert History]</div>
        <div class="empty-note">最近のアラートはありません</div>
      </div>`;
  }

  const items = list.map(a => `
    <div class="alert-hist-item">
      <span class="alert-hist-time">${a.timestamp || "—"}</span>
      <span class="alert-hist-msg">${a.message || "—"}</span>
    </div>`).join("");

  return `
    <div class="card">
      <div class="card-title">🔔 アラート履歴 [Alert History]</div>
      ${items}
    </div>`;
}

function build_footer() {
  return `<div class="footer">Nonki Asset Management</div>`;
}

// ── インタラクション ───────────────────────────────────────────
function toggle_details(btn) {
  const content = btn.nextElementSibling;
  const isHidden = content.classList.toggle("hidden");
  btn.textContent = isHidden ? "▼ 詳細を見る" : "▲ 閉じる";
}

function toggle_session(name, row) {
  const detail = document.getElementById("detail-" + name);
  const chev   = document.getElementById("chev-"   + name);
  if (!detail) return;
  const isHidden = detail.classList.toggle("hidden");
  if (chev) chev.classList.toggle("open", !isHidden);
}

// ③ タブ切り替え（data をグローバルに保持して再描画）
let _g_data = null;

function switch_tab(tab) {
  _current_tab = tab;
  if (!_g_data) return;
  // 成績カードだけ差し替える
  const card = document.getElementById("perf-card-wrap");
  if (card) {
    card.outerHTML = `<div id="perf-card-wrap">${build_performance(_g_data.daily, _g_data.monthly)}</div>`;
  }
}

// ── メインレンダー ─────────────────────────────────────────────
function render(data) {
  _g_data = data;
  const app   = document.getElementById("app");
  const parts = [];

  parts.push(build_status(data.system, data.meta));

  const alert_html = build_alert((data.system || {}).alert);
  if (alert_html) parts.push(alert_html);

  parts.push(build_signal_state(data.signal_state, data.last_trade_elapsed));
  parts.push(build_position(data.position));
  parts.push(`<div id="perf-card-wrap">${build_performance(data.daily, data.monthly)}</div>`);
  parts.push(build_sessions(data.sessions));
  parts.push(build_recent_trades(data.recent_trades));
  parts.push(build_alert_history(data.alert_history));
  parts.push(build_footer());

  app.innerHTML = parts.join("");
}

// ── エラー表示 ─────────────────────────────────────────────────
const LS_KEY = "nonki_last_success";

function show_error() {
  document.getElementById("load-error").classList.remove("hidden");
  const last  = localStorage.getItem(LS_KEY);
  const label = document.getElementById("last-success-label");
  label.textContent = last ? "最終確認: " + last : "最終確認: —";

  const note = document.getElementById("retry-note");
  let countdown = 30;
  note.textContent = `${countdown}秒後に自動で再試行します`;
  const timer = setInterval(() => {
    countdown--;
    if (countdown > 0) {
      note.textContent = `${countdown}秒後に自動で再試行します`;
    } else {
      clearInterval(timer);
      note.textContent = "再試行中...";
      location.reload();
    }
  }, 1000);
}

// ── データ取得 ─────────────────────────────────────────────────
fetch("data.json?t=" + Date.now())
  .then(r => {
    if (!r.ok) throw new Error("HTTP " + r.status);
    return r.json();
  })
  .then(data => {
    localStorage.setItem(LS_KEY, (data.meta || {}).updated_at || new Date().toLocaleString("ja-JP"));
    render(data);
  })
  .catch(err => {
    console.error(err);
    show_error();
  });
</script>
</body>
