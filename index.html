<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nonki Dashboard</title>
  <style>
    /* ── リセット・ベース ─────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e8eaf6;
      min-height: 100vh;
      padding: 16px; /* ① 12px → 16px */
    }

    /* ── レイアウト ───────────────────────────────── */
    .container {
      max-width: 480px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 14px; /* ① 10px → 14px */
    }

    /* ── カード共通 ───────────────────────────────── */
    .card {
      background: #1a1d27;
      border-radius: 18px; /* ② 14px → 18px */
      padding: 20px; /* ② 16px → 20px */
      border: 1px solid #2a2d3d;
      box-shadow: 0 2px 12px #00000040; /* ② 影を追加 */
    }
    .card-title {
      font-size: 13px; /* ① 11px → 13px */
      color: #8b90b0;  /* ② #7b7f9e → 少し明るく */
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 14px; /* ② 10px → 14px */
    }

    /* ── ステータスバー ───────────────────────────── */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1a1d27;
      border-radius: 18px; /* ② */
      padding: 16px 20px; /* ② */
      border: 1px solid #2a2d3d;
      box-shadow: 0 2px 12px #00000040; /* ② */
    }
    .status-label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 16px; /* ① 15px → 16px */
      font-weight: 600;
    }
    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }
    .dot-green  { background: #4caf50; box-shadow: 0 0 6px #4caf5088; }
    .dot-red    { background: #ef5350; box-shadow: 0 0 6px #ef535088; }
    .dot-yellow { background: #ffc107; box-shadow: 0 0 6px #ffc10788; }
    .updated-at {
      font-size: 13px; /* ① 11px → 13px */
      color: #8b90b0;  /* ② #555870 → 明るく */
    }

    /* ── アラート ─────────────────────────────────── */
    .alert-card {
      border-radius: 18px; /* ② */
      padding: 16px 20px; /* ② */
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px; /* ① 14px → 15px */
      font-weight: 500;
    }
    .alert-warning { background: #2d2200; border: 1px solid #7c5c00; color: #ffc107; }
    .alert-danger  { background: #2d0a0a; border: 1px solid #7c1a1a; color: #ef5350; }
    .hidden { display: none !important; }

    /* ── ポジション ───────────────────────────────── */
    .position-main {
      font-size: 22px; /* ① 20px → 22px */
      font-weight: 700;
      margin-bottom: 6px;
    }
    .position-sub {
      font-size: 14px; /* ① 13px → 14px */
      color: #8b90b0; /* ② */
    }
    .badge {
      display: inline-block;
      padding: 3px 11px; /* ② 少し広く */
      border-radius: 99px;
      font-size: 13px; /* ① 12px → 13px */
      font-weight: 600;
    }
    .badge-buy  { background: #0d3d1a; color: #4caf50; }
    .badge-sell { background: #3d0d0d; color: #ef5350; }
    .badge-none { background: #1e2030; color: #7b7f9e; }

    /* ── 今月の成績（③ 全面再設計） ──────────────── */
    .wl-row {
      display: flex;
      gap: 12px;
      margin-bottom: 18px;
    }
    .wl-box {
      flex: 1;
      background: #12141f;
      border-radius: 12px;
      padding: 14px 12px;
      text-align: center;
    }
    .wl-value {
      font-size: 28px; /* 大きく・主役 */
      font-weight: 800;
      margin-bottom: 4px;
      line-height: 1;
    }
    .wl-label {
      font-size: 13px;
      color: #8b90b0;
    }
    .metric-list {
      display: flex;
      flex-direction: column;
      gap: 0;
      margin-bottom: 4px;
    }
    .metric-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 11px 0;
      border-bottom: 1px solid #2a2d3d;
      font-size: 15px; /* ① */
    }
    .metric-row:last-child { border-bottom: none; }
    .metric-label { color: #8b90b0; }
    .metric-value { font-weight: 700; }

    /* 折りたたみ詳細 */
    .details-toggle {
      background: none;
      border: none;
      color: #8b90b0;
      font-size: 14px; /* ① 12px → 14px */
      cursor: pointer;
      padding: 10px 0 0; /* ② タップ領域を広く */
      width: 100%;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
    }
    .details-toggle:hover { color: #aab0cc; }
    .details-content {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #2a2d3d;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0; /* ② 5px → 8px */
      font-size: 15px; /* ① 13px → 15px */
    }
    .detail-label { color: #8b90b0; }
    .detail-note {
      font-size: 12px;
      color: #555870;
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid #1e2130;
    }

    .positive { color: #4caf50; }
    .negative { color: #ef5350; }
    .neutral  { color: #e8eaf6; }

    /* ── セッション ───────────────────────────────── */
    .session-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0; /* ② 8px → 10px */
      border-bottom: 1px solid #1e2130;
      font-size: 15px; /* ① 14px → 15px */
    }
    .session-row:last-child { border-bottom: none; }
    .session-name {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 500;
    }
    .session-badges {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }
    .badge-observe {
      background: #1a2a3a;
      color: #64b5f6;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-buy-only {
      background: #0d3d1a;
      color: #4caf50;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 600;
    }

    /* Tokyo 進捗バー */
    .progress-wrap {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #1e2130;
    }
    .progress-header {
      display: flex;
      justify-content: space-between;
      font-size: 13px; /* ① */
      color: #8b90b0;
      margin-bottom: 8px;
    }
    progress {
      width: 100%;
      height: 10px; /* ⑥ 6px → 10px */
      border-radius: 5px;
      appearance: none;
      -webkit-appearance: none;
    }
    progress::-webkit-progress-bar   { background: #1e2130; border-radius: 5px; }
    progress::-webkit-progress-value { background: #4caf50; border-radius: 5px; }
    progress::-moz-progress-bar      { background: #4caf50; border-radius: 5px; }

    /* ── エラー表示（④ 全面改善） ────────────────── */
    .error-card {
      background: #1a1d27;
      border: 1px solid #7c1a1a;
      border-radius: 18px;
      padding: 24px 20px;
      box-shadow: 0 2px 12px #00000040;
      text-align: center;
    }
    .error-icon {
      font-size: 36px;
      margin-bottom: 12px;
    }
    .error-title {
      font-size: 17px;
      font-weight: 700;
      color: #ef5350;
      margin-bottom: 10px;
    }
    .error-desc {
      font-size: 14px;
      color: #8b90b0;
      line-height: 1.7;
      margin-bottom: 20px;
    }
    .reload-btn {
      display: inline-block;
      background: #1e3a5f;
      color: #64b5f6;
      border: 1px solid #2a5a8f;
      border-radius: 99px;
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      margin-bottom: 16px;
    }
    .reload-btn:active { opacity: 0.7; }
    .error-last-success {
      font-size: 12px;
      color: #555870;
    }
    .error-retry-note {
      font-size: 12px;
      color: #555870;
      margin-top: 8px;
    }

    /* ── フッター ─────────────────────────────────── */
    .footer {
      text-align: center;
      color: #3a3d52;
      font-size: 12px;
      padding: 8px 0 4px;
    }
  </style>
</head>
<body>
<div class="container" id="app">
  <!-- ④ エラーカード（初期は非表示） -->
  <div class="error-card hidden" id="load-error">
    <div class="error-icon">⚠️</div>
    <div class="error-title">データを取得できませんでした</div>
    <div class="error-desc">
      GitHub Pages の反映に時間がかかっている<br>場合があります。<br>
      1〜2分後に再読み込みしてください。
    </div>
    <button class="reload-btn" onclick="location.reload()">🔄 再読み込み</button>
    <div class="error-last-success" id="last-success-label"></div>
    <div class="error-retry-note" id="retry-note"></div>
  </div>
</div>

<script>
// ── ユーティリティ ─────────────────────────────────────────────
function fmt_pnl(jpy) {
  if (jpy === null || jpy === undefined) return "—";
  const sign = jpy >= 0 ? "+" : "";
  return sign + jpy.toLocaleString("ja-JP") + "円";
}

function pnl_class(v) {
  if (v === null || v === undefined) return "neutral";
  return v >= 0 ? "positive" : "negative";
}

function fmt_winrate(v) {
  if (v === null || v === undefined) return "—";
  return Math.round(v * 100) + "%";
}

function fmt_ev(jpy) {
  if (jpy === null || jpy === undefined) return "—";
  const sign = jpy >= 0 ? "+" : "";
  return sign + Math.round(jpy).toLocaleString("ja-JP") + "円/件";
}

function fmt_dd(r) {
  if (r === null || r === undefined) return "—";
  return r.toFixed(2) + "R";
}

function dd_class(r) {
  if (r === null || r === undefined) return "neutral";
  return (r >= 4.0) ? "negative" : "positive";
}

// ── カードビルダー ─────────────────────────────────────────────
function build_status(system, meta) {
  const is_running = system.status === "running";
  const dot_cls    = is_running ? "dot-green" : "dot-red";
  const label      = is_running ? "稼働中 [RUNNING]" : "停止中 [STOPPED]";
  return `
    <div class="status-bar">
      <div class="status-label">
        <span class="dot ${dot_cls}"></span>
        ${label}
      </div>
      <div class="updated-at">最終更新: ${meta.updated_at}</div>
    </div>`;
}

function build_alert(alert) {
  if (!alert) return "";
  const cls  = alert.level === "danger" ? "alert-danger" : "alert-warning";
  const icon = alert.level === "danger" ? "🔴" : "⚠️";
  return `<div class="alert-card ${cls}">${icon} ${alert.message}</div>`;
}

function build_position(pos) {
  let main, sub;
  if (pos.has_position) {
    const dir_label = pos.direction === "buy" ? "買い [BUY]" : "売り [SELL]";
    const badge_cls = pos.direction === "buy" ? "badge-buy" : "badge-sell";
    main = `${pos.symbol} <span class="badge ${badge_cls}">${dir_label}</span>`;
    sub  = "保有中（損益はリアルタイム反映されません）";
  } else {
    main = `<span class="badge badge-none">ポジションなし</span>`;
    sub  = "現在取引していません";
  }
  return `
    <div class="card">
      <div class="card-title">📍 現在のポジション [Position]</div>
      <div class="position-main">${main}</div>
      <div class="position-sub">${sub}</div>
    </div>`;
}

// ③ 今月の成績カード（全面再設計）
function build_monthly(m) {
  const pnl_c = pnl_class(m.pnl_jpy);
  const ev_c  = pnl_class(m.ev_jpy);
  const dd_c  = dd_class(m.dd_r);
  return `
    <div class="card">
      <div class="card-title">📅 今月の成績 [Monthly]</div>

      <div class="wl-row">
        <div class="wl-box">
          <div class="wl-value positive">${m.wins}</div>
          <div class="wl-label">✅ 勝ち</div>
        </div>
        <div class="wl-box">
          <div class="wl-value negative">${m.losses}</div>
          <div class="wl-label">❌ 負け</div>
        </div>
      </div>

      <div class="metric-list">
        <div class="metric-row">
          <span class="metric-label">損益 [P&amp;L]</span>
          <span class="metric-value ${pnl_c}">${fmt_pnl(m.pnl_jpy)}</span>
        </div>
        <div class="metric-row">
          <span class="metric-label">勝率 [WinRate]</span>
          <span class="metric-value">${fmt_winrate(m.win_rate)}</span>
        </div>
      </div>

      <button class="details-toggle" onclick="toggle_details(this)">▼ 詳細を見る</button>
      <div class="details-content hidden">
        <div class="detail-row">
          <span class="detail-label">期待値 [EV]</span>
          <span class="${ev_c}">${fmt_ev(m.ev_jpy)}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">最大下落 [DD]</span>
          <span class="${dd_c}">${fmt_dd(m.dd_r)}</span>
        </div>
        <div class="detail-note">※ 1R = 総資産の2%。DD 5R超えで要警戒。</div>
      </div>
    </div>`;
}

function build_sessions(sessions) {
  const s     = sessions;
  const tokyo = s.tokyo;
  const cur   = tokyo.progress_current;
  const tgt   = tokyo.progress_target;
  const pct   = Math.round(cur / tgt * 100);

  return `
    <div class="card">
      <div class="card-title">🗂 セッション状態 [Sessions]</div>
      <div class="session-row">
        <div class="session-name">
          <span class="dot ${s.london.active ? 'dot-green' : 'dot-red'}"></span>
          London
        </div>
        <span style="font-size:14px;color:#8b90b0">${s.london.active ? '稼働中' : '停止中'}</span>
      </div>
      <div class="session-row">
        <div class="session-name">
          <span class="dot ${s.newyork.active ? 'dot-green' : 'dot-red'}"></span>
          NewYork
        </div>
        <span style="font-size:14px;color:#8b90b0">${s.newyork.active ? '稼働中' : '停止中'}</span>
      </div>
      <div class="session-row">
        <div class="session-name">
          <span class="dot dot-yellow"></span>
          Tokyo ⭐
        </div>
        <div class="session-badges">
          <span class="badge-observe">観察中 [OBSERVE]</span>
          <span class="badge-buy-only">BUYのみ [BUY ONLY]</span>
        </div>
      </div>
      <div class="progress-wrap">
        <div class="progress-header">
          <span>進捗 [Progress]</span>
          <span>${cur} / ${tgt} 件（${pct}%）</span>
        </div>
        <progress value="${cur}" max="${tgt}"></progress>
      </div>
    </div>`;
}

function build_footer() {
  return `<div class="footer">Nonki Asset Management</div>`;
}

// ── 詳細トグル ─────────────────────────────────────────────────
function toggle_details(btn) {
  const content = btn.nextElementSibling;
  const isHidden = content.classList.toggle("hidden");
  btn.textContent = isHidden ? "▼ 詳細を見る" : "▲ 閉じる";
}

// ── メインレンダー ─────────────────────────────────────────────
function render(data) {
  const app   = document.getElementById("app");
  const parts = [];

  parts.push(build_status(data.system, data.meta));
  const alert_html = build_alert(data.system.alert);
  if (alert_html) parts.push(alert_html);
  parts.push(build_position(data.position));
  parts.push(build_monthly(data.monthly));
  parts.push(build_sessions(data.sessions));
  parts.push(build_footer());

  app.innerHTML = parts.join("");
}

// ── ④ エラー表示（最終成功時刻 + 自動リトライ） ───────────────
const LS_KEY = "nonki_last_success";

function show_error() {
  document.getElementById("load-error").classList.remove("hidden");

  // 最終成功時刻を localStorage から取得
  const last = localStorage.getItem(LS_KEY);
  const label = document.getElementById("last-success-label");
  label.textContent = last ? "最終確認: " + last : "最終確認: —";

  // 30秒後に1回だけ自動リトライ
  const note = document.getElementById("retry-note");
  let countdown = 30;
  note.textContent = `${countdown}秒後に自動で再試行します`;
  const timer = setInterval(() => {
    countdown--;
    if (countdown > 0) {
      note.textContent = `${countdown}秒後に自動で再試行します`;
    } else {
      clearInterval(timer);
      note.textContent = "再試行中...";
      location.reload();
    }
  }, 1000);
}

// ── データ取得 ─────────────────────────────────────────────────
fetch("data.json?t=" + Date.now())
  .then(r => {
    if (!r.ok) throw new Error("HTTP " + r.status);
    return r.json();
  })
  .then(data => {
    // ④ 成功時刻を保存
    const now = data.meta?.updated_at || new Date().toLocaleString("ja-JP");
    localStorage.setItem(LS_KEY, now);
    render(data);
  })
  .catch(err => {
    console.error(err);
    show_error();
  });
</script>
</body>
</html>
